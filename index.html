<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Tools Collection by A. Rahimi</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%230d9488'/%3E%3Cpath d='M50,18 A22,22 0 0,0 30.5,54.5 C34.5,58.8 37,63.2 37,69 L63,69 C63,63.2 65.5,58.8 69.5,54.5 A22,22 0 0,0 50,18 Z M42,74 L58,74 A2,2 0 0,1 56,79 L44,79 A2,2 0 0,1 42,74 Z' fill='white'/%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <!-- Header / Navigation Bar -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90">
        <div class="max-w-none px-4 sm:px-6 lg:px-8 py-3 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-brand-50 text-brand-600 rounded-lg">
                    <i data-lucide="lightbulb" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-900 leading-tight">Faculty Tools Collection</h1>
                    <p class="text-xs text-gray-500">Curated utilities to help you manage your faculty duties</p>
                </div>
            </div>

            <!-- Compact Search Bar -->
            <div class="relative w-full sm:w-80 lg:w-96 group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search"
                        class="h-4 w-4 text-gray-400 group-focus-within:text-brand-500 transition-colors"></i>
                </div>
                <input type="text" id="searchInput"
                    class="block w-full pl-9 pr-3 py-1.5 border border-gray-300 rounded-lg text-sm bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 shadow-sm transition-all"
                    placeholder="Search tools...">
            </div>
        </div>
    </header>

    <!-- Main Content: Tools Grid -->
    <main id="tools" class="flex-grow max-w-none px-4 sm:px-6 lg:px-8 py-6 w-full flex flex-col justify-center">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Available Tools</span>
            <span class="text-xs text-gray-500" id="toolCount">Showing all tools.</span>
        </div>

        <!-- Grid Container -->
        <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-5">
            <!-- Cards will be injected here by JavaScript -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-10">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gray-100 mb-3">
                <i data-lucide="search-x" class="h-6 w-6 text-gray-400"></i>
            </div>
            <h3 class="text-base font-medium text-gray-900">No tools found</h3>
            <p class="text-xs text-gray-500 mt-1">Try adjusting your search terms.</p>
            <button
                onclick="document.getElementById('searchInput').value=''; document.getElementById('searchInput').dispatchEvent(new Event('input'));"
                class="mt-3 text-sm text-brand-600 hover:text-brand-700 font-medium">
                Clear search
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-3 mt-auto">
        <div class="max-w-none px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-gray-500">
                <div class="flex items-center gap-1.5 font-medium text-gray-700">
                    <i data-lucide="lightbulb" class="w-4 h-4 text-brand-600"></i>
                    <span>Faculty Tools by A. Rahimi</span>
                </div>
                <div>
                    &copy; 2026 Faculty Tools. All rights reserved.
                </div>
                <div class="flex space-x-4">
                    <a href="#" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i data-lucide="github" class="h-4 w-4"></i>
                    </a>
                    <a href="#" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i data-lucide="twitter" class="h-4 w-4"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Custom Toast Notification -->
    <div id="toast" class="toast flex items-center gap-3 shadow-lg">
        <i data-lucide="loader-2" class="h-5 w-5 animate-spin text-brand-400"></i>
        <span id="toastMessage">Loading tool...</span>
    </div>

    <!-- Application Logic -->
    <script>
        // Data for the tools
        const toolsData = [
            {
                id: 'brightspace-to-ceab',
                title: 'Brightspace to CEAB',
                description: 'Convert Brightspace grade exports to CEAB-compliant format.',
                icon: 'library',
                tags: ['Grades', 'CEAB', 'Utility'],
                color: 'text-amber-600',
                bgColor: 'bg-amber-50',
                path: 'brightspace-to-ceab.html'
            },
            {
                id: 'committee-selector',
                title: 'Committee Selector',
                description: 'Select an appropriate graduate committee based on research interests and expertise.',
                icon: 'users',
                tags: ['Research', 'Committee', 'Selection'],
                color: 'text-blue-600',
                bgColor: 'bg-blue-50',
                path: 'committee-selector.html'
            },
            {
                id: 'course-mapping-tool',
                title: 'Course Mapping Tool',
                description: 'Visualize and manage course mappings for the MAME program.',
                icon: 'map',
                tags: ['Academics', 'Curriculum', 'Visualization'],
                color: 'text-purple-600',
                bgColor: 'bg-purple-50',
                path: 'course-mapping.html',
            },
            {
                id: 'json-deduplicator-tool',
                title: 'JSON Deduplicator',
                description: 'Remove duplicate entries from JSON arrays.',
                icon: 'file-code',
                tags: ['Data', 'Cleaning', 'Utility'],
                color: 'text-green-600',
                bgColor: 'bg-green-50',
                path: 'json-deduplicator.html'
            },
            {
                id: 'bib-cleaner-tool',
                title: 'Bib Cleaner Tool',
                description: 'Clean and format bibliographic entries.',
                icon: 'file-text',
                tags: ['Data', 'Cleaning', 'Utility'],
                color: 'text-green-600',
                bgColor: 'bg-green-50',
                path: 'bib-cleaner.html'
            },
            {
                id: 'latex-flattener-tool',
                title: 'LaTeX Flattener Tool',
                description: 'Flatten nested LaTeX structures for improved compatibility.',
                icon: 'file-code',
                tags: ['Data', 'Cleaning', 'Utility'],
                color: 'text-green-600',
                bgColor: 'bg-green-50',
                path: 'latex-flattener.html'
            },
            {
                id: 'travel-policy-tool',
                title: 'Travel Policy Tool',
                description: 'Access and view the latest travel policies and procedures.',
                icon: 'plane',
                tags: ['Policy', 'Procedures', 'Utility'],
                color: 'text-blue-600',
                bgColor: 'bg-blue-50',
                path: 'travel-policy.html'
            },
            {
                id: 'bubblehead-dog',
                title: 'Bubblehead Dog',
                description: 'A fun tool for managing bubblehead dog-related tasks.',
                icon: 'dog',
                tags: ['Fun', 'Utility'],
                color: 'text-yellow-600',
                bgColor: 'bg-yellow-50',
                path: 'bubblehead-dog.html'
            },
            {
                id: '3dof-quanser-simulator',
                title: '3DOF Quanser Simulator',
                description: 'A simulator for testing and validating 3DOF Quanser control systems.',
                icon: 'cog',
                tags: ['Simulation', 'Control', 'Utility'],
                color: 'text-red-600',
                bgColor: 'bg-red-50',
                path: '3dof-quanser-simulator.html'
            },
            {
                id: 'proceedings-compiler',
                title: 'Proceedings Compiler',
                description: 'Compile and format conference proceedings for publication.',
                icon: 'file-text',
                tags: ['Data', 'Compilation', 'Utility'],
                color: 'text-green-600',
                bgColor: 'bg-green-50',
                path: 'proceedings-compiler.html'
            },
            {
                id: 'citation-generator',
                title: 'Citation Generator',
                description: 'Convert DOIs or search titles to format BibTeX, APA, MLA, IEEE, and Chicago.',
                icon: 'quote',
                tags: ['Research', 'Citation', 'Utility'],
                color: 'text-emerald-600',
                bgColor: 'bg-emerald-50',
                path: 'citation-generator.html'
            },
            {
                id: 'pdf-redactor',
                title: 'Secure PDF Redactor',
                description: 'Redact sensitive info from bank statements or locked PDFs by secure flattening.',
                icon: 'shield-alert',
                tags: ['Privacy', 'Finance', 'Utility'],
                color: 'text-teal-600',
                bgColor: 'bg-teal-50',
                path: 'pdf-redactor.html'
            },
            {
                id: 'pdf-fill-sign',
                title: 'PDF Fill & Sign',
                description: 'Fill out PDF forms, add checkmarks, and sign documents securely in-browser.',
                icon: 'signature',
                tags: ['Privacy', 'Signature', 'Utility'],
                color: 'text-brand-600',
                bgColor: 'bg-brand-50',
                path: 'pdf-fill-sign.html'
            }
        ];

        const toolsGrid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');
        const toolCountText = document.getElementById('toolCount');
        const emptyState = document.getElementById('emptyState');

        // Function to create a tool card HTML string
        function createCardHTML(tool) {
            const tagsHTML = tool.tags.map(tag =>
                `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-medium bg-gray-100 text-gray-600">${tag}</span>`
            ).join('');

            return `
                <div class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-brand-400 transition-all duration-300 flex flex-col h-full cursor-pointer group" onclick="navigateTo('${tool.title}', '${tool.path}')">
                    <div class="flex items-start justify-between mb-3.5">
                        <div class="p-2.5 rounded-lg ${tool.bgColor} ${tool.color} group-hover:scale-110 transition-transform duration-300">
                            <i data-lucide="${tool.icon}" class="w-5 h-5"></i>
                        </div>
                        <i data-lucide="arrow-up-right" class="w-5 h-5 text-gray-300 group-hover:text-brand-500 transition-colors"></i>
                    </div>
                    <h3 class="text-base font-bold text-gray-900 mb-1.5 group-hover:text-brand-600 transition-colors">${tool.title}</h3>
                    <p class="text-gray-500 text-sm mb-4 flex-grow leading-relaxed line-clamp-2" title="${tool.description}">${tool.description}</p>
                    <div class="flex flex-wrap gap-1.5 mt-auto pt-3 border-t border-gray-100">
                        ${tagsHTML}
                    </div>
                </div>
            `;
        }

        // Function to render tools based on filter
        function renderTools(filterText = '') {
            const lowerFilter = filterText.toLowerCase();

            const filteredTools = toolsData.filter(tool => {
                return tool.title.toLowerCase().includes(lowerFilter) ||
                    tool.description.toLowerCase().includes(lowerFilter) ||
                    tool.tags.some(tag => tag.toLowerCase().includes(lowerFilter));
            });

            if (filteredTools.length === 0) {
                toolsGrid.innerHTML = '';
                toolsGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                toolCountText.textContent = `0 tools found for "${filterText}".`;
            } else {
                toolsGrid.innerHTML = filteredTools.map(tool => createCardHTML(tool)).join('');
                toolsGrid.classList.remove('hidden');
                emptyState.classList.add('hidden');

                if (filterText === '') {
                    toolCountText.textContent = `Showing all ${filteredTools.length} tools.`;
                } else {
                    toolCountText.textContent = `Found ${filteredTools.length} tool${filteredTools.length === 1 ? '' : 's'}.`;
                }
            }

            // Re-initialize icons for newly added elements
            lucide.createIcons();
        }

        // Handle navigation to the actual tool pages
        function navigateTo(toolName, path) {
            if (path) {
                window.location.href = path;
            }
        }

        // Event listener for live search
        searchInput.addEventListener('input', (e) => {
            renderTools(e.target.value);
        });

        // Initial render
        renderTools();

    </script>
</body>

</html>
